aid: amazon-security-lake
name: Amazon Security Lake
description: >-
  Amazon Security Lake is a service that automatically centralizes an
  organization's security data from cloud, on-premises, and custom sources
  into a purpose-built data lake. It manages the data lifecycle to help you
  optimize storage and supports OCSF (Open Cybersecurity Schema Framework).
