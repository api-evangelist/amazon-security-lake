- Data Lake
- Security
- SIEM
- Threat Detection

apis:

- name: Amazon Security Lake API
  description: >-
    The Amazon Security Lake API provides programmatic access to create and
    manage data lakes, data sources, subscribers, and log sources for
    centralizing and analyzing security data across your organization using
    the OCSF (Open Cybersecurity Schema Framework).
