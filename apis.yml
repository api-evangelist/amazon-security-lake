name: Amazon Security Lake
description: >-
  Amazon Security Lake is a service that automatically centralizes an
  organization's security data from cloud, on-premises, and custom sources
  into a purpose-built data lake stored in your own Amazon S3. It manages
  the data lifecycle to help you optimize storage and supports OCSF
  (Open Cybersecurity Schema Framework) for normalized security data analysis.
url: https://aws.amazon.com/security-lake/
baseURL: https://securitylake.amazonaws.com
x-type: company
created: '2026-03-16'
modified: '2026-04-19'

tags:
